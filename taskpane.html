<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sortify</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
  <script defer src="taskpane.js"></script>
</head>
<body>
  <div class="container">

    <!-- Gauge -->
    <section class="card gauge-card">
      <svg id="gauge-svg" viewBox="0 0 200 110" class="gauge-svg" aria-label="Risk gauge">
        <path d="M20,100 A80,80 0 0,1 180,100"
              stroke="#1e1e1e" stroke-width="14" fill="none" stroke-linecap="round" />
        <path id="risk-arc"
              d="M20,100 A80,80 0 0,1 180,100"
              stroke="#22c55e" stroke-width="14" fill="none"
              stroke-linecap="round"
              stroke-dasharray="251" stroke-dashoffset="251" />
        <text id="score-label" x="100" y="94"
              text-anchor="middle" class="gauge-score">--</text>
      </svg>
      <div class="risk-badge" id="result-button">Scanning…</div>
    </section>

    <!-- Detail grid -->
    <section class="details-grid">

      <div class="detail-card">
        <div class="detail-icon">&#9786;</div>
        <div class="detail-info">
          <div class="detail-label">Sender</div>
          <div class="detail-value" id="sender">--</div>
        </div>
        <div class="detail-dot" id="sender-dot"></div>
      </div>

      <div class="detail-card">
        <div class="detail-icon">&#128279;</div>
        <div class="detail-info">
          <div class="detail-label">Link security</div>
          <div class="detail-value" id="links">--</div>
        </div>
        <div class="detail-dot" id="links-dot"></div>
      </div>

      <div class="detail-card">
        <div class="detail-icon">&#128206;</div>
        <div class="detail-info">
          <div class="detail-label">Attachments</div>
          <div class="detail-value" id="attachment">--</div>
        </div>
        <div class="detail-dot" id="attachment-dot"></div>
      </div>

      <div class="detail-card">
        <div class="detail-icon">&#9889;</div>
        <div class="detail-info">
          <div class="detail-label">Behaviour</div>
          <div class="detail-value" id="urgency">--</div>
        </div>
        <div class="detail-dot" id="urgency-dot"></div>
      </div>

    </section>

    <!-- Action -->
    <button class="action-btn" id="forward-btn">Mark as Suspicious</button>

  </div>
</body>
</html>
