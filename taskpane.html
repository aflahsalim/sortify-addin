<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sortify</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css"/>
  <script src="taskpane.js"></script>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">

    <!-- Header: logo icon + "Sortify" text once, status pill -->
    <header class="glass header">
      <div class="logo">
        <!-- Simple S shield icon — no text duplication -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"
                fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linejoin="round"/>
          <text x="12" y="15.5" text-anchor="middle"
                font-family="DM Sans, sans-serif" font-size="7" font-weight="600"
                fill="#00ff88">S</text>
        </svg>
        Sortify
      </div>
      <div id="status" class="status-pill">Scanning...</div>
    </header>

    <!-- Gauge -->
    <div class="glass gauge-card" id="gauge-card">
      <svg class="gauge-svg" viewBox="0 0 180 100">
        <defs>
          <!-- Default gradient — JS overrides stroke colour per risk level -->
          <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="0">
            <stop id="grad-start" offset="0%"   stop-color="#00ff88"/>
            <stop id="grad-end"   offset="100%" stop-color="#00cc66"/>
          </linearGradient>
        </defs>
        <!-- Track -->
        <path d="M18 90 A72 72 0 0 1 162 90"
              fill="none" stroke="rgba(255,255,255,0.06)"
              stroke-width="9" stroke-linecap="round"/>
        <!-- Active arc — JS animates stroke-dashoffset -->
        <path id="risk-arc"
              d="M18 90 A72 72 0 0 1 162 90"
              fill="none" stroke="url(#arc-grad)"
              stroke-width="9" stroke-linecap="round"
              stroke-dasharray="226" stroke-dashoffset="226"
              style="transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);"/>
        <!-- Needle -->
        <line id="needle"
              x1="90" y1="90" x2="90" y2="26"
              stroke="white" stroke-width="1.5" stroke-linecap="round"
              opacity="0.8"
              style="transform-origin:90px 90px; transform:rotate(-90deg);
                     transition: transform 0.8s cubic-bezier(.4,0,.2,1);"/>
        <circle cx="90" cy="90" r="3.5" fill="white" opacity="0.8"/>
      </svg>

      <div id="score-label" class="risk-label">—</div>
      <div id="result-button" class="risk-badge">—</div>
    </div>

    <!-- Detail rows -->
    <div class="glass details-card">

      <div class="detail-row">
        <div class="detail-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">Sender</span>
          <span id="sender" class="detail-value">—</span>
        </div>
        <div id="sender-dot" class="dot"></div>
      </div>

      <div class="detail-row">
        <div class="detail-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">Auth (SPF / DKIM)</span>
          <span id="links" class="detail-value">—</span>
        </div>
        <div id="links-dot" class="dot"></div>
      </div>

      <div class="detail-row">
        <div class="detail-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">Attachments</span>
          <span id="attachment" class="detail-value">—</span>
        </div>
        <div id="attachment-dot" class="dot"></div>
      </div>

      <div class="detail-row">
        <div class="detail-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">Urgency</span>
          <span id="urgency" class="detail-value">—</span>
        </div>
        <div id="urgency-dot" class="dot"></div>
      </div>

    </div>

    <!-- Report button -->
    <button id="report-btn" class="report-btn" onclick="reportEmail()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.56 3.44 2 2 0 0 1 3.53 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.75a16 16 0 0 0 6 6l.87-.87a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.44 16z"/>
      </svg>
      Send to Sortify team
    </button>

    <!-- Confirm modal -->
    <div id="confirm-overlay" class="confirm-overlay hidden">
      <div class="glass confirm-modal">
        <p class="confirm-text">Log this email to the Sortify dashboard and flag for review?</p>
        <div class="confirm-actions">
          <button class="btn-cancel"  onclick="closeConfirm()">Cancel</button>
          <button class="btn-confirm" onclick="confirmReport()">Confirm</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
