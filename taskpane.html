<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sortify</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css"/>
  <script src="taskpane.js"></script>
</head>
<body>
<div class="wrap">
  
  <!-- ── Score section ── -->
  <div class="score-section">

    <!-- Semicircle gauge with big number inside -->
    <div class="gauge-wrap">
      <svg class="gauge-svg" viewBox="0 0 200 115">
        <defs>
          <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="0">
            <stop id="gs" offset="0%"   stop-color="#22c55e"/>
            <stop id="ge" offset="100%" stop-color="#16a34a"/>
          </linearGradient>
        </defs>
        <!-- Track -->
        <path d="M22 105 A78 78 0 0 1 178 105"
              fill="none" stroke="rgba(255,255,255,0.07)"
              stroke-width="13" stroke-linecap="round"/>
        <!-- Active arc -->
        <path id="risk-arc"
              d="M22 105 A78 78 0 0 1 178 105"
              fill="none" stroke="url(#arc-grad)"
              stroke-width="13" stroke-linecap="round"
              stroke-dasharray="245" stroke-dashoffset="245"
              style="transition:stroke-dashoffset 0.9s cubic-bezier(.4,0,.2,1);"/>
        <!-- Needle -->
        <line id="needle"
              x1="100" y1="105" x2="100" y2="34"
              stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"
              style="transform-origin:100px 105px;transform:rotate(-90deg);
                     transition:transform 0.9s cubic-bezier(.4,0,.2,1);"/>
        <circle cx="100" cy="105" r="4" fill="rgba(255,255,255,0.7)"/>
        <!-- Big score number -->
        <text id="score-number" x="100" y="86"
              text-anchor="middle" dominant-baseline="central"
              font-family="Inter,sans-serif" font-size="34" font-weight="700"
              fill="#22c55e">—</text>
      </svg>
    </div>

    <!-- 0 / 100 axis labels -->
    <div class="gauge-labels">
      <span>0</span>
      <span>100</span>
    </div>

    <div class="score-title">RISK SCORE</div>

    <!-- Segmented colour bar (5 blocks, active ones light up) -->
    <div class="seg-bar">
      <div class="seg seg-1" id="seg1"></div>
      <div class="seg seg-2" id="seg2"></div>
      <div class="seg seg-3" id="seg3"></div>
      <div class="seg seg-4" id="seg4"></div>
      <div class="seg seg-5" id="seg5"></div>
    </div>

    <div id="verdict" class="verdict">Analysing...</div>

    <!-- Hidden compat elements -->
    <div id="score-label"   style="display:none;"></div>
    <div id="result-button" style="display:none;"></div>
  </div>

  <!-- ── 2×2 card grid ── -->
  <div class="grid">

    <!-- Sender -->
    <div class="info-card" id="card-sender">
      <div class="card-top">
        <div class="card-left">
          <div class="card-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="card-title">Sender</span>
        </div>
        <div class="card-tick" id="tick-sender">
          <svg viewBox="0 0 10 10" fill="none"><polyline points="2,5 4,7.5 8,3" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div id="sender-l1" class="card-line1">—</div>
      <div id="sender-l2" class="card-line2"></div>
      <div id="sender" class="card-result neutral">—</div>
    </div>

    <!-- Link security -->
    <div class="info-card" id="card-links">
      <div class="card-top">
        <div class="card-left">
          <div class="card-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </div>
          <span class="card-title">Link security</span>
        </div>
        <div class="card-tick" id="tick-links">
          <svg viewBox="0 0 10 10" fill="none"><polyline points="2,5 4,7.5 8,3" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div id="links-l1" class="card-line1">—</div>
      <div id="links-l2" class="card-line2"></div>
      <div id="links" class="card-result neutral">—</div>
    </div>

    <!-- Attachment check -->
    <div class="info-card" id="card-attach">
      <div class="card-top">
        <div class="card-left">
          <div class="card-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </div>
          <span class="card-title">Attachments</span>
        </div>
        <div class="card-tick" id="tick-attach">
          <svg viewBox="0 0 10 10" fill="none"><polyline points="2,5 4,7.5 8,3" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div id="attach-l1" class="card-line1">—</div>
      <div id="attach-l2" class="card-line2"></div>
      <div id="attachment" class="card-result neutral">—</div>
    </div>

    <!-- Behavioural analysis -->
    <div class="info-card" id="card-urgency">
      <div class="card-top">
        <div class="card-left">
          <div class="card-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <span class="card-title">Behaviour</span>
        </div>
        <div class="card-tick" id="tick-urgency">
          <svg viewBox="0 0 10 10" fill="none"><polyline points="2,5 4,7.5 8,3" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div id="urgency-l1" class="card-line1">—</div>
      <div id="urgency-l2" class="card-line2"></div>
      <div id="urgency" class="card-result neutral">—</div>
    </div>

  </div>

  <!-- ── Buttons ── -->
  <div class="btn-area">
    <button id="report-btn" class="btn-suspicious" onclick="reportEmail()">
      Mark as Suspicious
    </button>
  </div>

  <!-- ── Confirm modal ── -->
  <div id="overlay" class="overlay hidden">
    <div class="modal">
      <p>Flag this email as suspicious and send to the Sortify security team?</p>
      <div class="modal-btns">
        <button class="mbtn mbtn-cancel"  onclick="closeConfirm()">Cancel</button>
        <button class="mbtn mbtn-confirm" onclick="confirmReport()">Report it</button>
      </div>
    </div>
  </div>

</div>
</body>
</html>
