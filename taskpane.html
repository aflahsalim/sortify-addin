<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sortify</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
  <script defer src="taskpane.js"></script>
</head>
<body>
  <div class="container">

    <!-- Gauge / Trust score -->
    <section class="gauge-card">
      <div class="gauge-header">
        <span class="gauge-title">TRUST SCORE</span>
        <span id="status-pill" class="status-pill">Scanning…</span>
      </div>

      <svg viewBox="0 0 200 110" class="gauge-svg" aria-label="Risk gauge">
        <path
          d="M20,100 A80,80 0 0,1 180,100"
          class="gauge-bg"
        />
        <path
          id="risk-arc"
          d="M20,100 A80,80 0 0,1 180,100"
          class="gauge-arc"
        />
        <text
          id="score-number"
          x="100"
          y="88"
          class="gauge-score"
          text-anchor="middle"
        >--</text>
      </svg>

      <div id="verdict" class="verdict-text">Analysing email…</div>
    </section>

    <!-- Detail cards -->
    <section class="details-grid">

      <div class="detail-card" id="card-sender">
        <div class="detail-icon">&#9786;</div>
        <div class="detail-info">
          <div class="detail-label">Sender</div>
          <div class="detail-value" id="sender">--</div>
          <div class="detail-sub" id="sender-sub">Checking authentication…</div>
        </div>
        <div class="detail-dot" id="sender-dot"></div>
      </div>

      <div class="detail-card" id="card-links">
        <div class="detail-icon">&#128279;</div>
        <div class="detail-info">
          <div class="detail-label">Link security</div>
          <div class="detail-value" id="links">--</div>
          <div class="detail-sub" id="links-sub">No analysis yet</div>
        </div>
        <div class="detail-dot" id="links-dot"></div>
      </div>

      <div class="detail-card" id="card-attachment">
        <div class="detail-icon">&#128206;</div>
        <div class="detail-info">
          <div class="detail-label">Attachments</div>
          <div class="detail-value" id="attachment">--</div>
          <div class="detail-sub" id="attachment-sub">No analysis yet</div>
        </div>
        <div class="detail-dot" id="attachment-dot"></div>
      </div>

      <div class="detail-card" id="card-urgency">
        <div class="detail-icon">&#9889;</div>
        <div class="detail-info">
          <div class="detail-label">Behaviour</div>
          <div class="detail-value" id="urgency">--</div>
          <div class="detail-sub" id="urgency-sub">No analysis yet</div>
        </div>
        <div class="detail-dot" id="urgency-dot"></div>
      </div>

    </section>

    <!-- Action -->
    <button class="action-btn" id="report-btn">Mark as Suspicious</button>

  </div>
</body>
</html>
